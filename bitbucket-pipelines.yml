image: reactnativecommunity/react-native-android:latest

pipelines:
  branches:
    main:
      - step:
          name: Build APK
          caches:
            - node
            - gradle
          script:
            - npm install
            - cd android && chmod +x gradlew
            - ./gradlew assembleRelease
          artifacts:
            - android/app/build/outputs/apk/release/*.apk