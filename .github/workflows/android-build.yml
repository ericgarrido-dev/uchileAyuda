name: Build APK y enviar correo

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      - name: Instalar dependencias
        run: npm install

      - name: Build APK Release
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Guardar APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk

      - name: Enviar correo con link APK
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          REPO="${{ github.repository }}"
          RUN_ID="${{ github.run_id }}"
          LINK="https://github.com/${REPO}/actions/runs/${RUN_ID}"

          cat > /tmp/mail.txt << MAILEOF
          From: ${GMAIL_USER}
          To: eric.garrido@uchile.cl
          Subject: UchileAyuda - Nuevo APK generado
          MIME-Version: 1.0
          Content-Type: text/plain

          Se genero un nuevo APK de UchileAyuda.

          Descargalo aqui:
          ${LINK}

          (En la pagina, busca la seccion "Artifacts" y descarga "app-release")
          MAILEOF

          curl --ssl-reqd \
            --url "smtps://smtp.gmail.com:465" \
            --user "${GMAIL_USER}:${GMAIL_APP_PASSWORD}" \
            --mail-from "${GMAIL_USER}" \
            --mail-rcpt "eric.garrido@uchile.cl" \
            --upload-file /tmp/mail.txt