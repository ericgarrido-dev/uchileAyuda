- name: Build APK
  run: |
    cd android
    chmod +x gradlew
    ./gradlew assembleRelease --stacktrace

- name: Verificar APK
  run: |
    find android/app/build/outputs -name "*.apk"

- name: Upload APK
  uses: actions/upload-artifact@v4
  with:
    name: app-release
    path: android/app/build/outputs/apk/release/*.apk