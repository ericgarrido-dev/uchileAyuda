name: Build APK y enviar correo

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      - name: Instalar dependencias
        run: npm install

      - name: Build APK Release
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Verificar APK
        run: |
          find android/app/build/outputs -name "*.apk"

      - name: Guardar APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk

      - name: Probar envio correo
        run: |
          echo "Prueba GitHub Actions correo SMTP funcionando" > mensaje.txt

          curl --ssl-reqd \
            --url "smtps://smtp.gmail.com:465" \
            --user "${{ secrets.GMAIL_USER }}:${{ secrets.GMAIL_APP_PASSWORD }}" \
            --mail-from "${{ secrets.GMAIL_USER }}" \
            --mail-rcpt "eric.garrido@uchile.cl" \
            --upload-file mensaje.txt